<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 824" width="1200" height="824" role="img" aria-label="Mock operations dashboard for the intake readiness gate. All figures are modeled against synthetic data.">
  <rect x="0" y="0" width="1200" height="824" fill="#f1f5f9"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Header -->
    <text x="36" y="52" font-size="11" letter-spacing="2.5" fill="#64748b" font-weight="600">OPERATIONS DASHBOARD</text>
    <text x="36" y="80" font-size="23" fill="#0f172a" font-weight="700">Intake Readiness · Manual Review Queue</text>
    <g>
      <rect x="1014" y="44" width="150" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
      <circle cx="1034" cy="59" r="4" fill="#d97706"/>
      <text x="1046" y="63" font-size="11" letter-spacing="1.2" fill="#475569" font-weight="600">MODELED DATA</text>
    </g>

    <!-- KPI cards -->
    <!-- Card 1 -->
    <rect x="36" y="100" width="270" height="104" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="56" y="134" font-size="12" fill="#64748b">First-time-right rate</text>
    <text x="56" y="172" font-size="32" fill="#15803d" font-weight="700">75%</text>
    <text x="56" y="192" font-size="11" fill="#94a3b8">cases arriving workable</text>
    <!-- Card 2 -->
    <rect x="322" y="100" width="270" height="104" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="342" y="134" font-size="12" fill="#64748b">Avoidable manual touches</text>
    <text x="342" y="172" font-size="32" fill="#0e7490" font-weight="700">250<tspan font-size="15" fill="#94a3b8" font-weight="600"> / mo</tspan></text>
    <text x="342" y="192" font-size="11" fill="#94a3b8">caught at intake, not in queue</text>
    <!-- Card 3 -->
    <rect x="608" y="100" width="270" height="104" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="628" y="134" font-size="12" fill="#64748b">Analyst hours recovered</text>
    <text x="628" y="172" font-size="32" fill="#15803d" font-weight="700">62<tspan font-size="15" fill="#94a3b8" font-weight="600"> / mo</tspan></text>
    <text x="628" y="192" font-size="11" fill="#94a3b8">modeled projection</text>
    <!-- Card 4 -->
    <rect x="894" y="100" width="270" height="104" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="914" y="134" font-size="12" fill="#64748b">SLA breach rate</text>
    <text x="914" y="172" font-size="32" fill="#d97706" font-weight="700">14%</text>
    <text x="914" y="192" font-size="11" fill="#94a3b8">cases past target</text>

    <!-- Row 2 left: FTR by intake mode -->
    <rect x="36" y="242" width="548" height="260" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="56" y="272" font-size="12" letter-spacing="1.2" fill="#475569" font-weight="600">FIRST-TIME-RIGHT RATE BY INTAKE MODE</text>
    <!-- gridlines -->
    <line x1="120" y1="452" x2="556" y2="452" stroke="#e2e8f0"/>
    <line x1="120" y1="382" x2="556" y2="382" stroke="#f1f5f9"/>
    <line x1="120" y1="312" x2="556" y2="312" stroke="#f1f5f9"/>
    <text x="108" y="456" font-size="10" fill="#94a3b8" text-anchor="end">0%</text>
    <text x="108" y="386" font-size="10" fill="#94a3b8" text-anchor="end">50%</text>
    <text x="108" y="316" font-size="10" fill="#94a3b8" text-anchor="end">100%</text>
    <!-- bars -->
    <rect x="170" y="334" width="110" height="118" fill="#0e7490"/>
    <rect x="370" y="358" width="110" height="94" fill="#0e7490"/>
    <text x="225" y="326" font-size="18" fill="#0f172a" font-weight="700" text-anchor="middle">84%</text>
    <text x="425" y="350" font-size="18" fill="#0f172a" font-weight="700" text-anchor="middle">67%</text>
    <text x="225" y="472" font-size="12" fill="#475569" text-anchor="middle">Advisor-assisted</text>
    <text x="425" y="472" font-size="12" fill="#475569" text-anchor="middle">Self-guided</text>

    <!-- Row 2 right: Top not-ready reasons -->
    <rect x="600" y="242" width="564" height="260" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="620" y="272" font-size="12" letter-spacing="1.2" fill="#475569" font-weight="600">TOP NOT-READY REASONS</text>
    <text x="620" y="288" font-size="11" fill="#94a3b8">share of returned cases</text>
    <!-- row 1 -->
    <text x="620" y="330" font-size="12" fill="#334155">Missing document</text>
    <rect x="810" y="319" width="300" height="20" rx="3" fill="#0e7490"/>
    <text x="1118" y="334" font-size="12" fill="#0f172a" font-weight="700">41%</text>
    <!-- row 2 -->
    <text x="620" y="376" font-size="12" fill="#334155">Account structure</text>
    <rect x="810" y="365" width="198" height="20" rx="3" fill="#0e7490"/>
    <text x="1016" y="380" font-size="12" fill="#0f172a" font-weight="700">27%</text>
    <!-- row 3 -->
    <text x="620" y="422" font-size="12" fill="#334155">KYC mark not applied</text>
    <rect x="810" y="411" width="139" height="20" rx="3" fill="#0e7490"/>
    <text x="957" y="426" font-size="12" fill="#0f172a" font-weight="700">19%</text>
    <!-- row 4 -->
    <text x="620" y="468" font-size="12" fill="#334155">Document expired</text>
    <rect x="810" y="457" width="95" height="20" rx="3" fill="#0e7490"/>
    <text x="913" y="472" font-size="12" fill="#0f172a" font-weight="700">13%</text>

    <!-- Row 3 left: Queue aging distribution -->
    <rect x="36" y="518" width="548" height="260" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="56" y="548" font-size="12" letter-spacing="1.2" fill="#475569" font-weight="600">QUEUE AGING DISTRIBUTION</text>
    <text x="56" y="564" font-size="11" fill="#94a3b8">share of open cases</text>
    <line x1="96" y1="728" x2="540" y2="728" stroke="#e2e8f0"/>
    <!-- bars: baseline 728 -->
    <rect x="106" y="640" width="64" height="88" fill="#0e7490"/>
    <rect x="196" y="604" width="64" height="124" fill="#0e7490"/>
    <rect x="286" y="632" width="64" height="96" fill="#0e7490"/>
    <rect x="376" y="672" width="64" height="56" fill="#0e7490"/>
    <rect x="466" y="692" width="64" height="36" fill="#d97706"/>
    <text x="138" y="632" font-size="12" fill="#0f172a" font-weight="700" text-anchor="middle">22%</text>
    <text x="228" y="596" font-size="12" fill="#0f172a" font-weight="700" text-anchor="middle">31%</text>
    <text x="318" y="624" font-size="12" fill="#0f172a" font-weight="700" text-anchor="middle">24%</text>
    <text x="408" y="664" font-size="12" fill="#0f172a" font-weight="700" text-anchor="middle">14%</text>
    <text x="498" y="684" font-size="12" fill="#d97706" font-weight="700" text-anchor="middle">9%</text>
    <text x="138" y="746" font-size="11" fill="#475569" text-anchor="middle">&lt;1d</text>
    <text x="228" y="746" font-size="11" fill="#475569" text-anchor="middle">1-3d</text>
    <text x="318" y="746" font-size="11" fill="#475569" text-anchor="middle">3-7d</text>
    <text x="408" y="746" font-size="11" fill="#475569" text-anchor="middle">7-14d</text>
    <text x="498" y="746" font-size="11" fill="#d97706" text-anchor="middle">&gt;14d</text>

    <!-- Row 3 right: Lane distribution donut -->
    <rect x="600" y="518" width="564" height="260" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="620" y="548" font-size="12" letter-spacing="1.2" fill="#475569" font-weight="600">LANE DISTRIBUTION (READY CASES)</text>
    <g transform="rotate(-90 750 660)">
      <circle cx="750" cy="660" r="58" fill="none" stroke="#15803d" stroke-width="30" stroke-dasharray="127.5 364.42" stroke-dashoffset="0"/>
      <circle cx="750" cy="660" r="58" fill="none" stroke="#0e7490" stroke-width="30" stroke-dasharray="189.5 364.42" stroke-dashoffset="-127.5"/>
      <circle cx="750" cy="660" r="58" fill="none" stroke="#d97706" stroke-width="30" stroke-dasharray="47.4 364.42" stroke-dashoffset="-317"/>
    </g>
    <text x="750" y="656" font-size="22" fill="#0f172a" font-weight="700" text-anchor="middle">1,000</text>
    <text x="750" y="674" font-size="11" fill="#94a3b8" text-anchor="middle">cases / mo</text>
    <!-- legend -->
    <rect x="900" y="600" width="14" height="14" rx="3" fill="#15803d"/>
    <text x="924" y="612" font-size="13" fill="#334155">Fast-track candidate</text>
    <text x="1144" y="612" font-size="13" fill="#0f172a" font-weight="700" text-anchor="end">35%</text>
    <rect x="900" y="640" width="14" height="14" rx="3" fill="#0e7490"/>
    <text x="924" y="652" font-size="13" fill="#334155">Standard review</text>
    <text x="1144" y="652" font-size="13" fill="#0f172a" font-weight="700" text-anchor="end">52%</text>
    <rect x="900" y="680" width="14" height="14" rx="3" fill="#d97706"/>
    <text x="924" y="692" font-size="13" fill="#334155">Escalate immediately</text>
    <text x="1144" y="692" font-size="13" fill="#0f172a" font-weight="700" text-anchor="end">13%</text>

    <!-- Footer -->
    <text x="36" y="806" font-size="11" fill="#94a3b8">Illustrative layout. All figures are modeled against synthetic data and shown for design purposes only.</text>
  </g>
</svg>
